[general]
# Name identifier for the strategy
strategy_name = "RSI HFT Strategy"

[rsi]
# RSI calculation period (reduced for HFT)
period = 7
# RSI oversold threshold (less extreme for HFT)
oversold_threshold = 40.0
# RSI overbought threshold (less extreme for HFT)
overbought_threshold = 60.0
# Signal strength multiplier for RSI signals
signal_strength = 1.0

[trend]
# Short-term moving average period (faster for HFT)
ma_short_period = 5
# Long-term moving average period (faster for HFT)
ma_long_period = 20
# Trend strength multiplier for signal confidence
trend_strength = 0.8

[signals]
# Minimum confidence level (reduced to allow more trades)
min_confidence = 0.6
# Maximum time in seconds to hold a position before forced exit
max_position_time = 900.0
# Profit target percentage (reduced for more realistic targets)
profit_target = 1.5
# Stop loss percentage (tightened for HFT)
stop_loss = 1.0
# Maximum number of trades allowed per hour (increased for HFT)
max_trades_per_hour = 8
# Minimum time in seconds between consecutive trading signals (reduced for HFT)
signal_cooldown = 30.0
