[general]
# Name identifier for the strategy
strategy_name = "Advanced Order Strategy"

[twap]
# Duration of each time slice in seconds (2 minutes for HFT)
time_slice_duration = 12.0
# Maximum price deviation from target (0.3%)
price_deviation_limit = 0.00001
# Minimum confidence for TWAP signals
min_confidence = 0.9

[vwap]
# Period for VWAP calculation (15 periods for HFT)
calculation_period = 15
# Price deviation threshold from VWAP (0.2%)
deviation_threshold = 0.001
# Volume threshold for signal generation (2.0x average)
volume_threshold = 1.0
# Strength of mean reversion signal
reversion_strength = 0.9
# Base confidence divisor for VWAP signals
base_confidence_divisor = 0.1
# Minimum confidence for VWAP signals
min_vwap_confidence = 0.7
# Maximum confidence for VWAP signals
max_vwap_confidence = 0.9

[momentum]
# Momentum threshold for signal generation (0.2%)
momentum_threshold = 0.002
# Volume ratio threshold for momentum signals
volume_ratio_threshold = 1.8
# Confidence for momentum signals
momentum_confidence = 0.8

[order_types]
# Market impact threshold for volatility detection
market_impact_threshold = 0.0015
# Slippage tolerance percentage (0.15%)
slippage_tolerance = 0.0015
# Price change threshold for IOC signals (0.15%)
price_change_threshold = 0.0015
# Volume spike threshold for IOC signals
volume_spike_threshold = 1.8
# Low volatility multiplier for FOK signals
low_volatility_multiplier = 0.6
# High volume spike threshold for FOK signals
high_volume_spike_threshold = 2.2
# Volume confidence divisor for FOK signals
volume_confidence_divisor = 3.0
# Base confidence for IOC signals
ioc_base_confidence = 0.01
# Minimum confidence for IOC signals
min_ioc_confidence = 0.7
# Maximum confidence for IOC signals
max_ioc_confidence = 0.85

[signals]
# Minimum confidence level required to execute a trade
min_confidence = 0.7
# Maximum time in seconds to hold a position before forced exit
max_position_time = 900.0
# Profit target percentage for profitable positions
profit_target = 0.8
# Stop loss percentage for losing positions
stop_loss = 0.8
# Exit signal confidence
exit_signal_confidence = 0.9

[history]
# Maximum history size for price and volume data
max_history_size = 1000 #50 10000
