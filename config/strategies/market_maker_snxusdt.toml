# ═══════════════════════════════════════════════════════════════════════════
# MarketMaker Strategy Configuration — SNXUSDT
# ═══════════════════════════════════════════════════════════════════════════
#
# SNXUSDT characteristics:
#   Price: ~$0.275
#   Tick size: 0.001
#   1 tick = ~36 bps spread
#   ~2-6 trades/minute
#   Step size: 0.1
#
# Strategy: Buy passive at bid, sell passive at ask.
# Net edge per round-trip: ~16 bps (36 spread - 20 maker fees)
# This is a TIGHT edge — every parameter matters.

# --- Spread & pricing ---

# Minimum spread to accept entry (bps). SNXUSDT has ~36 bps natural spread.
# Set to 25 — filters compressed-spread ticks.
min_spread_bps = 25.0

# Round-trip maker cost: 2 * maker_fee = 2 * 10 bps = 20 bps.
round_trip_cost_bps = 20.0

# Minimum edge after subtracting costs. With 36 bps spread and 20 bps cost,
# edge is only ~16 bps. Set minimum to 5 bps — tighter than usual because
# the natural edge is already small.
min_edge_bps = 5.0

# --- Position management ---

# Max hold time. 2 minutes — at 2-6 tr/min, gives 4-12 opportunities
# for passive fill.
max_hold_millis = 120000

# Stop loss in bps. ~36 bps per tick → 80 bps ≈ ~2 adverse ticks.
# Tighter stop since edge is small — can't afford large losses.
stop_loss_bps = 80.0

# Cooldown after exit. 15 seconds.
entry_cooldown_millis = 15000

# --- Volatility filters ---
max_vol_bps = 500.0
panic_vol_bps = 1000.0

# --- Trade window ---
trade_window_millis = 60000
min_trades_in_window = 2

# --- Order book imbalance ---
imbalance_skew = 0.0
max_imbalance = 1.0

# --- Trade direction filter ---
require_seller_initiated = true
min_sell_flow_fraction = 0.0

# Price position filtering
price_position_window = 20
max_price_position = 0.3

# --- Sizing ---
# 5% of cash. With tight edge, moderate sizing to control risk.
cash_fraction = 0.05
