# ═══════════════════════════════════════════════════════════════════════════
# MarketMaker Strategy Configuration — WIFFDUSD
# ═══════════════════════════════════════════════════════════════════════════
#
# WIFFDUSD characteristics:
#   Price: ~$0.181
#   Tick size: 0.001
#   1 tick = ~55 bps spread (!!!)
#   ~1000 trades/day (low-medium liquidity)
#   Step size: 0.01
#
# ZERO MAKER FEE (Binance FDUSD promotion)
# WIDEST SPREAD among our FDUSD pairs — highest profit potential.
# 1 tick = ~55 bps of pure profit per round-trip.

# --- Spread & pricing ---
min_spread_bps = 0.1
round_trip_cost_bps = 0.0
min_edge_bps = 0.0

# --- Position management ---
# 120 second hold — less liquid, need more time for passive sell fill.
max_hold_millis = 120000

# Stop loss: 60 bps — slightly wider than 1-tick spread to avoid noise.
stop_loss_bps = 60.0

# 15 second cooldown — moderate since fills are less frequent.
entry_cooldown_millis = 15000

# --- Volatility filters ---
max_vol_bps = 800.0
panic_vol_bps = 3000.0

# --- Trade window ---
trade_window_millis = 30000
min_trades_in_window = 1

# --- Order book imbalance ---
imbalance_skew = 0.0
max_imbalance = 1.0

# --- Trade direction filter ---
require_seller_initiated = false
min_sell_flow_fraction = 0.0

# Price position filtering — disabled.
price_position_window = 20
max_price_position = 1.0

# --- Exit pricing ---
# 1 tick = ~55 bps. With 0% maker fee, this is pure profit.
min_exit_edge_bps = 50.0

# --- Sizing ---
cash_fraction = 0.25
