# ═══════════════════════════════════════════════════════════════════════════
# MarketMaker Strategy Configuration — TUSDT
# ═══════════════════════════════════════════════════════════════════════════
#
# TUSDT characteristics:
#   Price: ~$0.006
#   Tick size: 0.00001
#   1 tick = ~167 bps spread
#   Step size: 0.1
#
# Strategy: Buy passive at bid, sell passive at ask.
# Net edge per round-trip: ~147 bps (167 spread - 20 maker fees)

# --- Spread & pricing ---
min_spread_bps = 80.0
round_trip_cost_bps = 20.0
min_edge_bps = 15.0

# --- Position management ---
max_hold_millis = 120000
stop_loss_bps = 300.0
entry_cooldown_millis = 15000

# --- Volatility filters ---
max_vol_bps = 1500.0
panic_vol_bps = 3000.0

# --- Trade window ---
trade_window_millis = 90000
min_trades_in_window = 1

# --- Order book imbalance ---
imbalance_skew = 0.0
max_imbalance = 1.0

# --- Trade direction filter ---
require_seller_initiated = true
min_sell_flow_fraction = 0.0

# Price position filtering
price_position_window = 20
max_price_position = 0.3

# --- Sizing ---
cash_fraction = 0.06
