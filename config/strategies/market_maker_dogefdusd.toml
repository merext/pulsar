# ═══════════════════════════════════════════════════════════════════════════
# MarketMaker Strategy Configuration — DOGEFDUSD
# ═══════════════════════════════════════════════════════════════════════════
#
# DOGEFDUSD characteristics:
#   Price: ~$0.091
#   Tick size: 0.00001
#   1 tick = ~1.1 bps
#   ~14,400 trades/day (~10/min), $3M daily volume
#   Step size: 1 DOGE
#   Median spread: 2.2 bps (2 ticks)
#
# ZERO MAKER FEE (Binance FDUSD promotion)
#   Round-trip maker+maker = 0% (BNB fee ~1.5 bps)
#   Taker exit (emergency) = 10 bps
#
# High liquidity pair — tight spreads, fast fills expected.

# --- Spread & pricing ---
min_spread_bps = 0.1
round_trip_cost_bps = 1.5
min_edge_bps = 0.0

# --- Position management ---
max_hold_millis = 600000
stop_loss_bps = 30.0
entry_cooldown_millis = 2000

# --- Volatility filters ---
max_vol_bps = 1000.0
panic_vol_bps = 2000.0

# --- Trade window ---
trade_window_millis = 30000
min_trades_in_window = 1

# --- Order book imbalance ---
imbalance_skew = 0.0
max_imbalance = 1.0

# --- Trade direction filter ---
require_seller_initiated = false
min_sell_flow_fraction = 0.0

# Price position filtering
price_position_window = 20
max_price_position = 1.0

# --- Exit pricing ---
# 1 tick = 1.1 bps → lower bar for passive exit
min_exit_edge_bps = 1.0

# --- Sizing ---
cash_fraction = 0.15
